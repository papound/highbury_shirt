name: Build & Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  REGISTRY: 192.168.1.117:5000
  IMAGE: 192.168.1.117:5000/highbury/app

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1: Build และ Push image ไปยัง Private Registry
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: self-hosted
    outputs:
      image_tag: ${{ steps.meta.outputs.sha_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image tags/metadata
        id: meta
        run: |
          SHA_TAG="${{ env.IMAGE }}:${{ github.sha }}"
          LATEST_TAG="${{ env.IMAGE }}:latest"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
          echo "Building: ${SHA_TAG}"

      - name: Build Docker image
        run: |
          docker build \
            --tag "${{ steps.meta.outputs.sha_tag }}" \
            --tag "${{ steps.meta.outputs.latest_tag }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            .

      - name: Push to private registry
        run: |
          docker push "${{ steps.meta.outputs.sha_tag }}"
          docker push "${{ steps.meta.outputs.latest_tag }}"

      - name: Clean up old local images (keep last 5)
        run: |
          docker images "${{ env.IMAGE }}" --format "{{.ID}}" | tail -n +6 | xargs -r docker rmi || true

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2: Deploy — SSH เข้า Production แล้ว pull image ใหม่
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: self-hosted
    needs: build
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e

            echo "==> Ensuring insecure registry is configured..."
            DAEMON=/etc/docker/daemon.json
            if ! grep -q "192.168.1.117:5000" "$DAEMON" 2>/dev/null; then
              echo '{ "insecure-registries": ["192.168.1.117:5000"] }' > "$DAEMON"
              systemctl restart docker
              sleep 3
            fi

            cd /opt/highbury-shirt

            echo "==> Pulling latest image from registry..."
            docker compose pull app

            echo "==> Restarting app container (zero-downtime)..."
            docker compose up -d --no-build --wait app

            echo "==> Running DB migrations..."
            docker compose exec -T app npx prisma migrate deploy || {
              echo "migrate deploy failed"
              exit 1
            }

            echo "==> Verifying container health..."
            docker compose ps app

            echo "✓ Deploy completed at $(date)"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deploy failed! ตรวจสอบ logs ด้วย: docker compose logs --tail=50 app"

      - name: Cleanup CI runner
        if: always()
        run: |
          docker system prune -af
          rm -rf ~/actions-runner/_work/*
