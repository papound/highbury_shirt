name: Build & Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB: Deploy — SSH เข้า Production แล้ว git pull + build + restart
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: self-hosted
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            cd /opt/highbury-shirt

            echo "==> Fixing git safe directory..."
            git config --global --add safe.directory /opt/highbury-shirt

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Rebuilding Docker image..."
            docker compose build app

            echo "==> Restarting app container..."
            docker compose up -d --wait app

            echo "==> Running DB migrations..."
            docker compose exec -T app npx prisma migrate deploy || {
              echo "migrate deploy failed"
              exit 1
            }

            echo "==> Verifying container health..."
            docker compose ps app

            echo "✓ Deploy completed at $(date)"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deploy failed! ตรวจสอบ logs ด้วย: ssh into server && docker compose logs --tail=50 app"

      - name: Cleanup CI runner
        if: always()
        run: |
          docker system prune -f || true
